<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS & Stock Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <!-- Navbar Sisi Kiri -->
    <nav class="w-20 md:w-64 bg-teal-800 text-white flex flex-col transition-all">
        <div class="p-6 text-center border-b border-teal-700">
            <h1 class="hidden md:block text-xl font-bold tracking-widest">MANUS POS</h1>
            <i class="fas fa-cash-register text-2xl md:hidden"></i>
        </div>
        <div class="flex-1 py-4 space-y-2">
            <button onclick="showPage('pos' )" class="nav-link w-full flex items-center p-4 hover:bg-teal-700 transition active">
                <i class="fas fa-shopping-cart w-8 text-center"></i>
                <span class="hidden md:block ml-2">Kasir / POS</span>
            </button>
            <button onclick="showPage('stock')" class="nav-link w-full flex items-center p-4 hover:bg-teal-700 transition">
                <i class="fas fa-boxes w-8 text-center"></i>
                <span class="hidden md:block ml-2">Kelola Stok</span>
            </button>
            <button onclick="showPage('report')" class="nav-link w-full flex items-center p-4 hover:bg-teal-700 transition">
                <i class="fas fa-chart-line w-8 text-center"></i>
                <span class="hidden md:block ml-2">Laporan</span>
            </button>
            <button onclick="showPage('settings')" class="nav-link w-full flex items-center p-4 hover:bg-teal-700 transition">
                <i class="fas fa-cog w-8 text-center"></i>
                <span class="hidden md:block ml-2">Pengaturan</span>
            </button>
        </div>
        <div class="p-4 border-t border-teal-700 text-[10px] text-teal-300 text-center hidden md:block">
            v2.0 - Stock Management
        </div>
    </nav>

    <!-- Konten Utama -->
    <div class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Halaman KASIR (POS) -->
        <div id="page-pos" class="page flex-1 flex overflow-hidden">
            <main class="flex-1 flex flex-col p-4 overflow-hidden">
                <div id="dashboard-mini" class="mb-4 grid grid-cols-3 gap-4">
                    <!-- Laporan singkat hari ini -->
                    <div class="bg-white p-3 rounded-lg shadow-sm border-l-4 border-green-500">
                        <p class="text-[10px] uppercase text-gray-400 font-bold">Omzet Hari Ini</p>
                        <p id="today-omzet" class="text-lg font-bold text-gray-800">Rp 0</p>
                    </div>
                </div>
                <div class="flex flex-col space-y-2 mb-4">
                    <input type="text" id="search-input" placeholder="Cari produk..." class="w-full p-2 rounded-lg border border-gray-200 outline-none focus:ring-2 focus:ring-teal-500">
                    <div id="category-filter" class="grid grid-rows-3 grid-flow-col gap-2 pb-2 overflow-x-auto">
                        <!-- Kategori akan diisi secara dinamis dalam 3 baris menggunakan CSS Grid -->
                    </div>
                </div>
                <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 overflow-y-auto pr-2"></div>
            </main>
            <aside class="w-80 bg-white border-l border-gray-200 flex flex-col">
                <div class="p-4 border-b font-bold text-gray-700 flex justify-between">
                    ORDER SUMMARY <button id="clear-cart" class="text-red-500 text-xs">Batal</button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
                <div class="p-4 bg-gray-50 border-t space-y-3">
                    <div class="flex justify-between font-bold"><span>Total</span> <span id="cart-total" class="text-orange-500">Rp 0</span></div>
                    <button id="btn-bayar" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg">BAYAR</button>
                </div>
            </aside>
        </div>

        <!-- Halaman KELOLA STOK -->
        <div id="page-stock" class="page flex-1 p-6 overflow-y-auto hidden">
            <h2 class="text-2xl font-bold mb-6">Manajemen Stok</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Form Restock -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-teal-700 mb-4"><i class="fas fa-plus-circle mr-2"></i>Stok Masuk (Restock)</h3>
                    <div class="space-y-4">
                        <select id="stock-sku" class="w-full p-2 border rounded-lg"></select>
                        <input type="number" id="stock-qty" placeholder="Jumlah Masuk" class="w-full p-2 border rounded-lg">
                        <input type="number" id="stock-modal" placeholder="Harga Modal Baru (Opsional)" class="w-full p-2 border rounded-lg">
                        <input type="text" id="stock-alasan" placeholder="Alasan (Contoh: Beli dari Suplier A)" class="w-full p-2 border rounded-lg">
                        <button onclick="processStockAction('restock')" class="w-full bg-teal-600 text-white py-2 rounded-lg font-bold">Simpan Stok Masuk</button>
                    </div>
                </div>
                <!-- Form Opname -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-orange-600 mb-4"><i class="fas fa-sync mr-2"></i>Penyesuaian (Stock Opname)</h3>
                    <div class="space-y-4">
                        <select id="opname-sku" class="w-full p-2 border rounded-lg"></select>
                        <input type="number" id="opname-qty" placeholder="Stok Fisik Sebenarnya" class="w-full p-2 border rounded-lg">
                        <input type="text" id="opname-alasan" placeholder="Alasan (Contoh: Barang Rusak / Selisih)" class="w-full p-2 border rounded-lg">
                        <button onclick="processStockAction('opname')" class="w-full bg-orange-500 text-white py-2 rounded-lg font-bold">Update Stok Fisik</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Halaman LAPORAN (Sudah ada di versi sebelumnya) -->
        <div id="page-report" class="page flex-1 p-6 overflow-y-auto hidden">
            <h2 class="text-2xl font-bold mb-6">Laporan Penjualan</h2>
            <div id="report-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>

        <!-- Halaman PENGATURAN -->
        <div id="page-settings" class="page flex-1 p-6 overflow-y-auto hidden">
            <h2 class="text-2xl font-bold mb-6">Pengaturan Sistem</h2>
            <div class="max-w-2xl bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-teal-700 mb-4"><i class="fas fa-link mr-2"></i>Konfigurasi API</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Google Apps Script URL</label>
                        <input type="text" id="settings-api-url" placeholder="https://script.google.com/macros/s/.../exec" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-teal-500">
                        <p class="text-[10px] text-gray-400 mt-1">Masukkan URL Web App dari Google Apps Script Anda.</p>
                    </div>
                    <button onclick="saveSettings()" class="w-full bg-teal-600 text-white py-2 rounded-lg font-bold hover:bg-teal-700 transition">Simpan Pengaturan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
