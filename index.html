<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800"><i class="fas fa-cash-register mr-2"></i>POS Sederhana</h1>
        <div id="dashboard-mini" class="text-sm font-medium text-green-600 bg-green-50 px-3 py-1 rounded-full">
            Omzet Hari Ini: <span id="today-omzet">Rp 0</span>
        </div>
    </header>
<!-- Section Laporan (Tambahkan di atas <main>) -->
<section class="bg-white border-b border-gray-200 p-4 grid grid-cols-3 gap-4">
    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
        <h4 class="text-xs font-bold text-blue-600 uppercase">Hari Ini</h4>
        <p class="text-lg font-black text-blue-800" id="rep-daily-omzet">Rp 0</p>
        <p class="text-[10px] text-blue-500">Laba: <span id="rep-daily-laba">Rp 0</span></p>
        <p class="text-[10px] text-gray-500 mt-1 italic">Terlaris: <span id="rep-daily-top">-</span></p>
    </div>
    <div class="bg-purple-50 p-3 rounded-lg border border-purple-100">
        <h4 class="text-xs font-bold text-purple-600 uppercase">Minggu Ini</h4>
        <p class="text-lg font-black text-purple-800" id="rep-weekly-omzet">Rp 0</p>
        <p class="text-[10px] text-purple-500">Laba: <span id="rep-weekly-laba">Rp 0</span></p>
        <p class="text-[10px] text-gray-500 mt-1 italic">Terlaris: <span id="rep-weekly-top">-</span></p>
    </div>
    <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
        <h4 class="text-xs font-bold text-orange-600 uppercase">Bulan Ini</h4>
        <p class="text-lg font-black text-orange-800" id="rep-monthly-omzet">Rp 0</p>
        <p class="text-[10px] text-orange-500">Laba: <span id="rep-monthly-laba">Rp 0</span></p>
        <p class="text-[10px] text-gray-500 mt-1 italic">Terlaris: <span id="rep-monthly-top">-</span></p>
    </div>
</section>

    <main class="flex-1 flex overflow-hidden">
        <!-- Bagian Kiri: Produk -->
        <section class="w-2/3 flex flex-col p-4 space-y-4">
            <!-- Search & Filter -->
            <div class="flex space-x-2">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="search-input" placeholder="Cari nama atau barcode produk..." 
                           class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <select id="category-filter" class="bg-white border border-gray-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Semua Kategori</option>
                </select>
            </div>

            <!-- Grid Produk -->
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto pr-2">
                <!-- Produk akan dimuat di sini oleh JavaScript -->
                <div class="col-span-full text-center py-10 text-gray-500">Memuat produk...</div>
            </div>
        </section>

        <!-- Bagian Kanan: Ringkasan Pesanan -->
        <aside class="w-1/3 bg-white border-l border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                <div>
                    <h2 class="font-bold text-gray-800">ORDER SUMMARY</h2>
                    <p class="text-xs text-gray-400" id="current-trx-id">TRX-NEW</p>
                </div>
                <button id="clear-cart" class="text-red-400 hover:text-red-600 text-sm px-2 py-1 rounded border border-red-100">Batal</button>
            </div>

            <!-- List Item di Keranjang -->
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Item akan muncul di sini -->
                <p class="text-center text-gray-400 mt-10">Keranjang kosong</p>
            </div>

            <!-- Footer Kasir -->
            <div class="p-4 bg-gray-50 border-t border-gray-200 space-y-4">
                <div class="flex justify-between items-end">
                    <span class="text-gray-500 text-sm font-bold uppercase">Estimasi Total</span>
                    <span class="text-2xl font-black text-orange-500" id="cart-total">Rp 0</span>
                </div>
                <button id="btn-bayar" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95 flex justify-center items-center">
                    <i class="fas fa-shopping-cart mr-2"></i> PROSES BAYAR
                </button>
            </div>
        </aside>
    </main>

    <!-- Modal Loading/Success -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl text-center max-w-sm w-full">
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
